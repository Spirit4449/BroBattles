<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Account Banned</title>
    <link rel="shortcut icon" href="/assets/sword.svg" type="image/x-icon" />
    <style>
      :root {
        --bg-a: #130a0a;
        --bg-b: #331212;
        --panel: rgba(23, 9, 9, 0.9);
        --border: rgba(248, 113, 113, 0.45);
        --title: #fecaca;
        --text: #fee2e2;
        --muted: #fca5a5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Lato", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 20% 20%, rgba(239, 68, 68, 0.2), transparent 40%),
          radial-gradient(circle at 80% 80%, rgba(127, 29, 29, 0.35), transparent 45%),
          linear-gradient(145deg, var(--bg-a), var(--bg-b));
      }

      .ban-card {
        width: min(680px, calc(100vw - 32px));
        border: 1px solid var(--border);
        background: var(--panel);
        padding: 24px;
        box-shadow: 0 20px 42px rgba(0, 0, 0, 0.45);
        border-radius: 10px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(24px, 4vw, 34px);
        color: var(--title);
      }

      p {
        margin: 0;
        line-height: 1.5;
      }

      .reason {
        margin-top: 16px;
        border-radius: 10px;
        padding: 14px;
        border: 1px solid rgba(252, 165, 165, 0.45);
        background: rgba(69, 10, 10, 0.45);
        color: var(--muted);
        white-space: pre-wrap;
      }

      .hint {
        margin-top: 14px;
        color: var(--muted);
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main class="ban-card">
      <h1>You have been banned</h1>
      <section class="reason" id="banReason">Reason unavailable.</section>
      <p class="hint">If this is an error, contact support and include the reason shown above.</p>
    </main>
    <script>
      (function () {
        function getCookie(name) {
          const key = `${encodeURIComponent(name)}=`;
          const parts = document.cookie ? document.cookie.split(";") : [];
          for (const part of parts) {
            const trimmed = part.trim();
            if (trimmed.startsWith(key)) {
              return decodeURIComponent(trimmed.slice(key.length));
            }
          }
          return "";
        }

        const reason = getCookie("bb_ban_reason") || "Abuse policy violation.";
        const reasonEl = document.getElementById("banReason");
        if (reasonEl) reasonEl.textContent = reason;
      })();
    </script>
  </body>
</html>
