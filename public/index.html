<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="/assets/sword.svg" type="image/x-icon" />
    <title>Bro Battles</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="/bundles/index.css" />
  </head>
  <body>
    <div id="navbar">
      <div class="flex">
        <img src="/assets/sword.svg" width="20px" />
        <h2>Bro Battles</h2>
      </div>
      <div class="flex" id="navbar-right">
        <div class="flex resources">
          <img src="/assets/coin.webp" width="20px" alt="coins" />
          <p id="coin-count"></p>
        </div>

        <div class="flex resources">
          <img src="/assets/gem.webp" width="20px" alt="gems" />
          <p id="gem-count"></p>
        </div>
        <button
          id="username-button"
          class="account username-account pixel-menu-button"
        >
          <span id="username-text"></span>
        </button>
        <div class="flex account pixel-menu-button" id="sign-out">Sign Up</div>
        <div class="flex account pixel-menu-button" id="login">Log in</div>
      </div>
    </div>

    <button id="create-party" class="party-button pixel-menu-button">
      <p>Create Party</p>
    </button>

    <div id="lobby-area" class="mode-1">
      <div class="platform your-team-1" data-team="your-team" data-slot="1">
        <div class="character-slot empty" id="your-slot-1">
          <div class="switch-character">
            <img src="/assets/switch.svg" height="18px" alt="" />
          </div>
          <div class="username">Random</div>
          <img class="character-sprite random" id="sprite" alt="Random" />
          <div class="status invite">Invite</div>
        </div>
        <div class="platform-image"></div>
      </div>

      <div id="vs-container">
        <img src="/assets/vs.webp" id="vs" alt="vs" width="100px" />
      </div>

      <div class="platform op-team-1" data-team="op-team" data-slot="1">
        <div class="character-slot empty" id="op-slot-1">
          <div class="username op-player">Random</div>
          <img
            class="character-sprite random"
            src="/assets/random.webp"
            alt="Random"
          />
          <div class="status invite">Invite</div>
        </div>
        <div class="platform-image"></div>
      </div>
    </div>

    <div id="bottom-bar">
      <div class="dropdown-group">
        <select
          id="mode"
          name="mode"
          class="dropdown pixel-menu-button"
          data-sound="cursor4"
        >
          <option value="1">1v1</option>
          <option value="2">2v2</option>
          <option value="3">3v3</option>
        </select>
        <input type="hidden" id="mode-id" value="duels" />
        <input type="hidden" id="mode-variant-id" value="duels-1v1" />
        <button
          id="mode-picker-open"
          type="button"
          class="mode-picker pixel-menu-button"
          data-sound="cursor4"
          aria-label="Open mode selector"
        >
          <img
            id="mode-preview-img"
            src="/assets/fightImage.webp"
            alt="Mode preview"
          />
          <span class="mode-picker-copy">
            <span id="mode-preview-name">Duels</span>
            <span id="mode-preview-subtitle">1v1</span>
          </span>
        </button>
        <select
          id="map"
          name="map"
          class="dropdown pixel-menu-button"
          data-sound="cursor4"
        >
          <option value="1">Lushy Peaks</option>
          <option value="2">Mangrove Meadow</option>
          <option value="3">Serenity</option>
        </select>
        <button
          id="map-picker-open"
          type="button"
          class="map-picker pixel-menu-button"
          data-sound="cursor4"
          aria-label="Open map selector"
        >
          <img
            id="map-preview-img"
            src="/assets/lushy/lobbyBg.webp"
            alt="Map preview"
          />
          <span id="map-preview-name">Lushy Peaks</span>
        </button>
      </div>

      <input
        type="submit"
        id="ready"
        class="pixel-menu-button"
        value="Ready"
        data-sound="ready"
      />
    </div>

    <div id="profile-overlay" class="hidden" aria-hidden="true">
      <div class="profile-overlay-backdrop"></div>
      <section
        class="profile-popup"
        role="dialog"
        aria-modal="true"
        aria-labelledby="profile-popup-title"
      >
        <header class="profile-popup-head">
          <h2 id="profile-popup-title">Your Profile</h2>
          <button
            id="profile-close"
            class="profile-close pixel-menu-button"
            type="button"
          >
            Close
          </button>
        </header>

        <div class="profile-popup-grid">
          <article class="profile-panel profile-stats-panel">
            <h3>Stats</h3>
            <div class="profile-stat-row">
              <span>Username</span><strong id="profile-username">-</strong>
            </div>
            <div class="profile-stat-row">
              <span>Coins</span><strong id="profile-coins">0</strong>
            </div>
            <div class="profile-stat-row">
              <span>Gems</span><strong id="profile-gems">0</strong>
            </div>
            <div class="profile-stat-row">
              <span>Trophies</span><strong id="profile-trophies">0</strong>
            </div>
            <div class="profile-stat-row">
              <span>Total Matches</span><strong id="profile-matches">0</strong>
            </div>
            <div class="profile-stat-row">
              <span>Avg Char Level</span
              ><strong id="profile-avg-level">1</strong>
            </div>
          </article>

          <article class="profile-panel profile-account-panel">
            <h3>Account Settings</h3>
            <form id="profile-username-form" class="profile-form">
              <label for="profile-new-username">Change Username</label>
              <input
                id="profile-new-username"
                type="text"
                maxlength="20"
                required
              />
              <button
                class="profile-action-btn pixel-menu-button"
                type="submit"
              >
                Update Name
              </button>
            </form>
            <form id="profile-password-form" class="profile-form">
              <label for="profile-current-password">Current Password</label>
              <input
                id="profile-current-password"
                type="password"
                minlength="6"
              />
              <label for="profile-new-password">New Password</label>
              <input
                id="profile-new-password"
                type="password"
                minlength="6"
                required
              />
              <button
                class="profile-action-btn pixel-menu-button"
                type="submit"
              >
                Update Password
              </button>
            </form>
            <p
              id="profile-message"
              class="profile-message"
              aria-live="polite"
            ></p>
          </article>
        </div>

        <section class="profile-panel profile-cards-panel">
          <h3>Player Cards</h3>
          <div id="profile-cards-grid" class="profile-cards-grid"></div>
        </section>
      </section>
    </div>

    <!-- Matchmaking Overlay (static element) -->
    <div id="matchmaking-overlay" class="mm-overlay hidden" aria-hidden="true">
      <div class="mm-bg" aria-hidden="true"></div>
      <div
        class="mm-card"
        role="dialog"
        aria-modal="true"
        aria-labelledby="mm-heading"
      >
        <h1 id="mm-heading" class="mm-heading">Matchmaking</h1>
        <div class="mm-progress">
          <div class="mm-label">Players Found</div>
          <div class="mm-count">
            <span id="mm-found">0</span> / <span id="mm-total">2</span>
          </div>
        </div>
        <div class="mm-info">
          <div class="mm-meta">
            <div><strong>Mode:</strong> <span id="mm-mode">1v1</span></div>
            <div>
              <strong>Map:</strong> <span id="mm-map">Lushy Peaks</span>
            </div>
          </div>
          <div id="mm-players" class="mm-players-grid" aria-live="polite"></div>
        </div>
        <div id="mm-tips">
          <span class="mm-tips-icon">💡</span>
          <span id="tips-text"></span>
        </div>
        <div class="mm-actions">
          <button
            id="mm-cancel"
            class="mm-btn pixel-menu-button"
            type="button"
            data-sound="cancel"
          >
            Cancel
          </button>
        </div>
      </div>
    </div>

    <script>
      (function () {
        var tips = [
          "Stay still to regenerate health. Pick your moment wisely.",
          "Watch the yellow bar. When it's full, your special attack is ready.",
          "Earn more gems by racking up kills and dealing big damage.",
          "Jump toward a wall and press jump again to wall jump your way up.",
          "Falling off the map is an instant KO. Stay on solid ground.",
          "Spend your coins in the shop to upgrade your character's stats.",
          "Use gems to unlock new characters with unique fighting styles.",
          "Every attack has a cooldown. Wait for it before swinging again.",
          "Ammo is limited! Aim carefully and don't waste your shots.",
          "Low on health? Back off and regenerate before re-engaging.",
          "Team up with your partner to focus one enemy at a time.",
          "Wall jumping can save your life after being knocked off the edge.",
          "Your special attack deals massive damage. Save it for the right moment.",
          "Keep moving. A stationary target is an easy target.",
          "Different characters have different ranges. Know your spacing.",
          "Left-click to attack. No need to reach for J.",
          "Right-click to unleash your special when the yellow bar is full.",
        ];
        var idx = Math.floor(Math.random() * tips.length);
        var el = document.getElementById("tips-text");
        function showTip() {
          if (!el) return;
          el.style.opacity = "0";
          setTimeout(function () {
            el.textContent = tips[idx];
            el.style.opacity = "1";
            idx = (idx + 1) % tips.length;
          }, 350);
        }
        showTip();
        setInterval(showTip, 4000);
      })();
    </script>
    <script src="/bundles/index.bundle.js"></script>
  </body>
</html>
