<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game</title>
    <link rel="shortcut icon" href="/assets/sword.svg" type="image/x-icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      @font-face {
        font-family: "Press Start 2P";
        src: url("/assets/PressStart2P.woff2") format("woff2");
        font-display: swap;
      }

      html,
      body {
        margin: 0;
        overflow: hidden;
        font-family: "Lato", sans-serif;
        background: transparent !important;
        height: 100%;
      }
      /* Full-bleed background image behind Phaser */
      .background {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        z-index: 0;
      }
      /* Full-viewport poison water bg (covers side/top strips outside Phaser canvas) */
      #poison-water-bg {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 0;
        background: linear-gradient(
          to top,
          rgba(22, 101, 52, 0.72) 0%,
          rgba(22, 163, 74, 0.42) 55%,
          transparent 100%
        );
        pointer-events: none;
        z-index: 0;
        display: none;
      }
      /* Red vignette pulsing from screen edges while player is in poison water */
      #water-vignette {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 2;
        background: radial-gradient(
          ellipse at center,
          transparent 38%,
          rgba(185, 28, 28, 0.68) 100%
        );
        opacity: 0;
      }
      @keyframes water-danger-pulse {
        0%,
        100% {
          opacity: 0.32;
        }
        50% {
          opacity: 0.78;
        }
      }
      .water-danger-active {
        animation: water-danger-pulse 0.9s ease-in-out infinite !important;
      }
      .background-image {
        width: 100%;
        height: 100%;
        object-position: 50% 100%;
        object-fit: cover;
        display: block;
      }
      /* Ensure Phaser canvas is above and transparent */
      canvas {
        position: fixed;
        left: 50%;
        transform: translateX(-50%);
        bottom: 0;
        z-index: 1;
        background: transparent !important;
        display: block;
      }
      #game-bg {
        opacity: 0;
      }
      #game-bg.visible {
        opacity: 1;
        transition: opacity 0.2s ease-in;
      }

      /* ===== Loading UI ===== */
      #loading-wrap {
        position: fixed;
        left: 50%;
        transform: translateX(-50%);
        bottom: 20px;
        width: min(720px, 92vw);
        z-index: 3;
        pointer-events: none;
      }

      #loading-text {
        text-align: center;
        font-weight: 600;
        font-size: clamp(14px, 2.2vw, 18px);
        margin: 0 0 8px 0;
        color: #fff;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
      }

      .loading-shell {
        position: relative;
        width: 100%;
        height: 18px;
        border-radius: 6px;
        overflow: hidden;
        background: rgba(0, 0, 0, 0.35);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1);
      }

      .loading-fill {
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        width: 0%;
        background: red;
        transition: width 200ms ease;
      }

      #loading-percent {
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 12px;
        font-weight: 700;
        color: #fff;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.7);
        pointer-events: none;
      }

      .hidden {
        display: none !important;
      }

      #game-timer-hud.hud-intro-enter,
      #team-status-hud.hud-intro-enter {
        opacity: 0;
        transform: translateY(-28px);
        transition:
          transform 360ms cubic-bezier(0.22, 0.9, 0.32, 1),
          opacity 320ms ease;
      }
      #game-timer-hud.hud-intro-enter.in,
      #team-status-hud.hud-intro-enter.in {
        opacity: 1;
        transform: translateY(0);
      }

      /* ===== Battle Start Overlay (playful, blue-toned game card style) ===== */
      #battle-start-overlay {
        position: fixed;
        inset: 0;
        z-index: 9998;
      }
      #battle-start-overlay.hidden {
        display: none !important;
      }
      #battle-start-overlay .bs-wrap {
        position: absolute;
        inset: 0;
        display: block;
        transition: opacity 0.3s ease;
        opacity: 0;
      }
      #battle-start-overlay .bs-backdrop {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(
            circle at 50% 35%,
            rgba(35, 62, 96, 0.2),
            rgba(8, 13, 22, 0.46) 58%,
            rgba(3, 5, 10, 0.74)
          ),
          rgba(0, 0, 0, 0.58);
        opacity: 0;
        transition: opacity 240ms ease;
      }
      #battle-start-overlay .bs-backdrop::before,
      #battle-start-overlay .bs-backdrop::after {
        content: "";
        position: absolute;
        border-radius: 999px;
        filter: blur(20px);
        opacity: 0;
        transition: opacity 280ms ease;
      }
      #battle-start-overlay .bs-backdrop::before {
        width: min(42vw, 560px);
        height: min(42vw, 560px);
        left: -10vw;
        top: 18vh;
        background: radial-gradient(
          circle,
          rgba(35, 165, 255, 0.32) 0%,
          rgba(35, 165, 255, 0) 72%
        );
        animation: bs-blob-left 4.8s ease-in-out infinite;
      }
      #battle-start-overlay .bs-backdrop::after {
        width: min(36vw, 500px);
        height: min(36vw, 500px);
        right: -8vw;
        top: 12vh;
        background: radial-gradient(
          circle,
          rgba(147, 199, 255, 0.28) 0%,
          rgba(147, 199, 255, 0) 70%
        );
        animation: bs-blob-right 5.4s ease-in-out infinite;
      }
      #battle-start-overlay .bs-panel {
        position: absolute;
        inset: 0;
        background: transparent;
        border: 0;
        box-shadow: none;
        color: #eaf5ff;
        text-align: center;
        overflow: visible;
      }
      #battle-start-overlay .bs-panel::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image: radial-gradient(
          circle,
          rgba(188, 225, 255, 0.2) 1px,
          transparent 1.8px
        );
        background-size: 18px 18px;
        opacity: 0;
        transition: opacity 260ms ease;
        animation: bs-dots-shift 11s linear infinite;
        pointer-events: none;
      }
      #battle-start-overlay .bs-grid {
        position: absolute;
        inset: 76px 60px 0;
        z-index: 2;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 26px;
        align-content: center;
      }
      #battle-start-overlay .bs-col {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        align-content: center;
        gap: 16px;
        padding: 10px;
      }
      #battle-start-overlay .bs-player-card {
        --pn-x: 50%;
        --pn-y: 20%;
        --pn-maxw: 72%;
        --pn-scale: 1;
        --cn-x: 50%;
        --cn-y: 25.5%;
        --cn-maxw: 66%;
        --cn-scale: 0.9;
        --spr-x: 50%;
        --spr-y: 52%;
        --spr-w: 36%;
        --spr-h: 29%;
        --stats-x: 50%;
        --stats-y: 72%;
        --stats-w: 68%;
        --stats-h: 12%;
        --enter-x: 0px;
        --enter-y: 12px;

        position: relative;
        width: min(20vw, 220px);
        aspect-ratio: 650 / 1250;
        opacity: 0;
        transform: translate3d(var(--enter-x), var(--enter-y), 0) scale(0.92);
        filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.42));
        transition:
          transform 240ms ease,
          opacity 240ms ease,
          filter 240ms ease;
      }
      #battle-start-overlay .bs-player-card::after {
        content: "";
        position: absolute;
        inset: 14% 12%;
        z-index: -1;
        border-radius: 18px;
        background: radial-gradient(
          circle,
          rgba(120, 210, 255, 0.42) 0%,
          rgba(120, 210, 255, 0.2) 42%,
          rgba(120, 210, 255, 0) 72%
        );
        filter: blur(22px);
        opacity: 0;
        transform: scale(0.92);
        transition:
          opacity 260ms ease,
          transform 260ms ease;
        pointer-events: none;
      }

      #battle-start-overlay[data-team-size="1"] .bs-player-card {
        width: min(22vw, 245px);
      }
      #battle-start-overlay[data-team-size="2"] .bs-player-card {
        width: min(18.5vw, 205px);
      }
      #battle-start-overlay[data-team-size="3"] .bs-player-card {
        width: min(15vw, 172px);
      }

      #battle-start-overlay .bs-header {
        position: absolute;
        top: 14px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 4;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        text-align: center;
        pointer-events: none;
      }

      #battle-start-overlay .bs-brand-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      #battle-start-overlay .bs-brand-logo {
        width: 50px;
        height: 50px;
        object-fit: contain;
        filter: drop-shadow(0 2px 5px rgba(0, 0, 0, 0.45));
      }

      #battle-start-overlay .bs-brand-title {
        font-family: "Press Start 2P", "Lato", sans-serif;
        font-size: clamp(11px, 3vw, 30px);
        color: #eaf6ff;
        letter-spacing: 1px;
        text-shadow: 0 2px 0 rgba(0, 0, 0, 0.4);
      }

      #battle-start-overlay .bs-map-mode {
        font-size: clamp(9px, 2vw, 20px);
        color: #c8e7ff;
        text-transform: uppercase;
        letter-spacing: 0.8px;
      }
      #battle-start-overlay .bs-player-card.is-in {
        opacity: 1;
        transform: translate3d(0, 0, 0) scale(1);
        filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.42))
          drop-shadow(0 0 14px rgba(111, 205, 255, 0.5));
      }
      #battle-start-overlay .bs-player-card.is-in::after {
        opacity: 0.72;
        transform: scale(1);
      }
      #battle-start-overlay .bs-card-frame {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: contain;
      }
      #battle-start-overlay .bs-card-player-name,
      #battle-start-overlay .bs-card-character-name,
      #battle-start-overlay .bs-card-sprite-wrap,
      #battle-start-overlay .bs-card-stats {
        position: absolute;
        left: 50%;
        transform: translate(-50%, -50%);
      }
      #battle-start-overlay .bs-card-player-name {
        left: 50%;
        top: 21.2%;
        max-width: 74%;
        font-size: clamp(12px, 1.08vw, 15px);
        font-weight: 700;
        color: #f9fdff;
        text-shadow: 0 2px 3px rgba(0, 0, 0, 0.75);
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      #battle-start-overlay .bs-card-character-name {
        left: 50%;
        top: 27.6%;
        max-width: 68%;
        font-size: clamp(10px, 0.9vw, 12px);
        font-weight: 600;
        color: #ced7e2;
        text-transform: capitalize;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.7);
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      #battle-start-overlay .bs-card-sprite-wrap {
        left: 50%;
        top: 53%;
        width: 36%;
        height: 29%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #battle-start-overlay .bs-card-sprite {
        width: 100%;
        height: 100%;
        object-fit: contain;
        image-rendering: pixelated;
        filter: drop-shadow(0 4px 0 rgba(0, 0, 0, 0.35));
      }
      #battle-start-overlay .bs-card-stats {
        left: 50%;
        top: 71.6%;
        width: 67%;
        height: 11.8%;
        border-radius: 10px;
        background: linear-gradient(
          180deg,
          rgba(44, 54, 74, 0.85),
          rgba(37, 44, 61, 0.82)
        );
        border: 1px solid rgba(162, 192, 230, 0.35);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2px;
        padding: 2px 6px;
      }
      #battle-start-overlay .bs-card-stat-label {
        font-size: clamp(7px, 0.65vw, 9px);
        text-transform: uppercase;
        letter-spacing: 0.7px;
        color: #a5c0e6;
      }
      #battle-start-overlay .bs-card-stat-value {
        font-size: clamp(11px, 1.1vw, 14px);
        font-weight: 700;
        color: #f4f8ff;
      }
      #battle-start-overlay .bs-count {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        z-index: 4;
        font-size: clamp(28px, 6vw, 56px);
        font-weight: 800;
        margin: 0;
        letter-spacing: 2px;
        color: #d6ecff;
        font-family: "Press Start 2P", "Lato", sans-serif;
        text-shadow: 0 3px 0 rgba(0, 0, 0, 0.35);
        opacity: 0;
        transition: opacity 200ms ease;
      }
      #battle-start-overlay.phase-darkened .bs-backdrop {
        opacity: 1;
      }
      #battle-start-overlay.phase-darkened .bs-backdrop::before,
      #battle-start-overlay.phase-darkened .bs-backdrop::after {
        opacity: 1;
      }
      #battle-start-overlay.phase-cards .bs-panel::before {
        opacity: 0.38;
      }
      #battle-start-overlay.phase-cards .bs-count {
        opacity: 1;
      }

      @keyframes bs-blob-left {
        0%,
        100% {
          transform: translate3d(0, 0, 0) scale(1);
        }
        50% {
          transform: translate3d(5vw, -2vh, 0) scale(1.08);
        }
      }
      @keyframes bs-blob-right {
        0%,
        100% {
          transform: translate3d(0, 0, 0) scale(1);
        }
        50% {
          transform: translate3d(-4vw, 3vh, 0) scale(1.06);
        }
      }
      @keyframes bs-dots-shift {
        0% {
          background-position: 0 0;
        }
        100% {
          background-position: 36px 26px;
        }
      }

      #game-timer-hud {
        position: fixed;
        top: 10px;
        left: 50%;
        transform: translateY(0);
        z-index: 9998;
        background: linear-gradient(
          180deg,
          rgba(40, 44, 62, 0.94),
          rgba(42, 47, 64, 0.96)
        );
        border: 2px solid #1e3a8a;
        border-radius: 12px;
        color: #e2e8f0;
        box-shadow:
          0 8px 24px rgba(0, 0, 0, 0.45),
          inset 0 0 0 1px rgba(96, 165, 250, 0.1);
        padding: 8px 20px 10px;
        text-align: center;
        min-width: 130px;
        pointer-events: none;
      }
      #game-timer-hud.hud-intro-enter,
      #game-timer-hud.hud-intro-enter.in {
        left: 50%;
      }
      #game-timer-hud.hud-intro-enter {
        transform: translate(-50%, -28px);
      }
      #game-timer-hud.hud-intro-enter.in {
        transform: translate(-50%, 0);
      }
      #game-timer-hud .timer-display {
        font-family: "Press Start 2P", "Lato", sans-serif;
        font-size: clamp(22px, 3.8vw, 30px);
        letter-spacing: 3px;
        color: #e2e8f0;
        line-height: 1;
        display: block;
      }
      #game-timer-hud .timer-label {
        font-size: 8px;
        font-family: "Press Start 2P", "Lato", sans-serif;
        color: #60a5fa;
        letter-spacing: 0.3px;
        margin-top: 5px;
        display: block;
      }
      #game-timer-hud.sudden-death .timer-display {
        color: #f87171;
        animation: sd-blink 0.9s step-start infinite;
      }
      #game-timer-hud.sudden-death .timer-label {
        color: #fca5a5;
      }
      @keyframes sd-blink {
        0%,
        49% {
          opacity: 1;
        }
        50%,
        100% {
          opacity: 0.45;
        }
      }

      #battle-keybind-hud {
        position: fixed;
        top: 10px;
        right: 10px;
        z-index: 9999;
        width: min(200px, calc(100vw - 20px));
        background: linear-gradient(
          180deg,
          rgba(34, 40, 61, 0.9),
          rgba(48, 53, 72, 0.6)
        );
        border: 2px solid #1e3a8a;
        border-radius: 10px;
        color: #e2e8f0;
        box-shadow:
          0 8px 20px rgba(0, 0, 0, 0.45),
          inset 0 0 0 1px rgba(96, 165, 250, 0.08);
        padding: 8px 8px 7px;
        text-align: left;
      }
      #battle-keybind-hud .hud-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 6px;
        margin-bottom: 6px;
      }
      #battle-keybind-hud .bs-help-title {
        font-family: "Press Start 2P", "Lato", sans-serif;
        font-size: 9px;
        line-height: 1.35;
        color: #60a5fa;
      }
      #battle-keybind-hud .bs-help-dismiss {
        width: 20px;
        height: 20px;
        border: 1px solid #a9d7ff;
        border-radius: 6px;
        background: linear-gradient(180deg, #4b95e6, #3678c3);
        color: #fff;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        line-height: 1;
        box-shadow: 0 2px 0 #214c7c;
      }
      #battle-keybind-hud .bs-help-dismiss:active {
        transform: translateY(1px);
        box-shadow: 0 1px 0 #214c7c;
      }
      #battle-keybind-hud .bs-help-list {
        margin: 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 4px;
        font-size: 11px;
      }
      #battle-keybind-hud .bs-help-row {
        display: grid;
        grid-template-columns: minmax(140px, 1fr) auto;
        align-items: center;
        gap: 6px;
      }
      #battle-keybind-hud .bs-help-row kbd {
        display: inline-block;
        min-width: 22px;
        border: 1px solid #cde9ff;
        border-radius: 6px;
        padding: 2px 6px;
        background: linear-gradient(180deg, #eff8ff, #cfe8ff);
        font-family: "Press Start 2P", "Lato", sans-serif;
        font-size: 8px;
        text-align: center;
        color: #14457a;
        box-shadow:
          0 2px 0 #7fb5e7,
          0 3px 6px rgba(0, 0, 0, 0.18);
      }
      #battle-keybind-hud .bs-help-row .key-group {
        display: inline-flex;
        gap: 4px;
        align-items: center;
      }
      #battle-keybind-hud .keyboard-pair {
        display: inline-flex;
        gap: 8px;
        align-items: flex-end;
      }
      #battle-keybind-hud .keyboard-cluster {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(2, auto);
        gap: 3px;
      }
      #battle-keybind-hud .keyboard-cluster .spacer {
        width: 18px;
        height: 1px;
      }
      #battle-keybind-hud .keyboard-cluster kbd {
        min-width: 18px;
        padding: 2px 0;
      }
      #battle-keybind-hud .bs-help-row span {
        color: #bfdbfe;
      }

      #team-status-hud {
        position: fixed;
        left: 10px;
        top: 10px;
        z-index: 9997;
        width: min(208px, calc(100vw - 20px));
        background: linear-gradient(
          180deg,
          rgba(42, 50, 78, 0.9),
          rgba(24, 31, 62, 0.9)
        );
        border: 2px solid #1e3a8a;
        border-radius: 10px;
        color: #e2e8f0;
        box-shadow:
          0 8px 20px rgba(0, 0, 0, 0.45),
          inset 0 0 0 1px rgba(96, 165, 250, 0.08);
        padding: 7px;
      }
      #team-status-hud .team-hud-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        column-gap: 6px;
        row-gap: 3px;
        align-items: center;
      }
      #team-status-hud .team-hud-title {
        margin: 0;
        font-family: "Press Start 2P", "Lato", sans-serif;
        font-size: 8px;
        letter-spacing: 0.3px;
        color: #60a5fa;
        text-align: center;
        padding-bottom: 3px;
        border-bottom: 1px solid rgba(96, 165, 250, 0.35);
      }
      #team-status-hud .team-hud-cell {
        min-height: 20px;
        margin: 0;
        padding: 0;
      }
      #team-status-hud .team-hud-player {
        display: grid;
        grid-template-columns: 16px 1fr;
        align-items: center;
        gap: 5px;
        padding: 3px 5px;
        border: 1px solid rgba(30, 58, 138, 0.7);
        border-radius: 7px;
        background: rgba(8, 18, 58, 0.65);
        transition:
          filter 140ms ease,
          opacity 140ms ease;
      }
      #team-status-hud .team-hud-player.disconnected {
        opacity: 0.55;
      }
      #team-status-hud .team-hud-player img {
        width: 14px;
        height: 14px;
        image-rendering: pixelated;
        object-fit: contain;
      }
      #team-status-hud .team-hud-player-name {
        font-size: 11px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      #team-status-hud .team-hud-player.dead {
        filter: grayscale(1);
        opacity: 0.55;
      }

      @media (max-width: 760px) {
        #battle-start-overlay .bs-grid {
          inset: 70px 10px 0;
          grid-template-columns: 1fr;
          align-content: center;
        }
        #battle-start-overlay .bs-player-card {
          width: min(34vw, 200px);
        }
        #battle-keybind-hud {
          top: 8px;
          right: 8px;
          width: min(246px, calc(100vw - 16px));
        }
        #game-timer-hud {
          top: 8px;
          right: 8px;
          left: auto;
          transform: none;
        }
        #team-status-hud {
          top: 8px;
          left: 8px;
          bottom: auto;
          width: min(186px, calc(100vw - 16px));
        }
      }
    </style>
  </head>

  <body>
    <div class="background" id="matchmaking-screen">
      <img
        src="/assets/matchmakingscreen.webp"
        class="background-image"
        alt="loading"
      />
    </div>

    <div class="background" id="game-bg">
      <img
        src="/assets/lushy/gameBg.webp"
        class="background-image"
        alt="game background"
      />
    </div>

    <!-- Poison water CSS overlay: fills viewport strips outside Phaser canvas -->
    <div id="poison-water-bg"></div>

    <!-- Red edge vignette shown while local player is submerged -->
    <div id="water-vignette"></div>
    <div id="hud"></div>

    <aside id="team-status-hud" class="hidden" aria-live="polite">
      <div class="team-hud-grid" id="team-status-grid"></div>
    </aside>

    <div id="game-timer-hud" class="hidden" aria-live="polite">
      <span class="timer-display" id="game-timer-display">3:00</span>
      <span class="timer-label" id="game-timer-label">Time Remaining</span>
    </div>

    <!-- Battle Start Overlay (populated by game.js) -->
    <div id="battle-start-overlay" class="hidden" aria-hidden="true">
      <div class="bs-wrap">
        <div class="bs-backdrop"></div>
        <div class="bs-panel">
          <div class="bs-header" aria-live="polite">
            <div class="bs-brand-row">
              <img
                class="bs-brand-logo"
                src="/assets/sword.svg"
                alt="Bro Battles"
              />
              <div class="bs-brand-title">Bro Battles</div>
            </div>
            <div class="bs-map-mode" id="bs-map-mode">Lushy Peaks • 1v1</div>
          </div>
          <div class="bs-grid">
            <div class="bs-col your" id="bs-your"></div>
            <div class="bs-col opp" id="bs-opp"></div>
          </div>
          <div id="countdown-display" class="bs-count">3</div>
        </div>
      </div>
    </div>

    <aside id="battle-keybind-hud" class="hidden" aria-live="polite">
      <div class="hud-head">
        <div class="bs-help-title">Controls</div>
        <button
          id="battle-keybind-dismiss"
          class="bs-help-dismiss"
          type="button"
          aria-label="Dismiss controls"
        >
          ×
        </button>
      </div>
      <ul class="bs-help-list">
        <li class="bs-help-row">
          <span class="keyboard-pair">
            <span class="keyboard-cluster" aria-hidden="true">
              <span class="spacer"></span><kbd>W</kbd
              ><span class="spacer"></span> <kbd>A</kbd><kbd>S</kbd><kbd>D</kbd>
            </span>
            <span class="keyboard-cluster" aria-hidden="true">
              <span class="spacer"></span><kbd>↑</kbd
              ><span class="spacer"></span> <kbd>←</kbd><kbd>↓</kbd><kbd>→</kbd>
            </span>
          </span>
          <span>Move</span>
        </li>

        <li class="bs-help-row"><kbd>J</kbd><span>Attack</span></li>
        <li class="bs-help-row"><kbd>I</kbd><span>Special</span></li>
      </ul>
    </aside>

    <!-- Loading UI -->
    <div
      id="loading-wrap"
      role="status"
      aria-live="polite"
      aria-label="Loading"
    >
      <p id="loading-text">Loading...</p>
      <div class="loading-shell" id="loading-shell">
        <div class="loading-fill" id="loading-bar-fill"></div>
        <span id="loading-percent">0%</span>
      </div>
    </div>

    <!-- Helper: update progress -->
    <script>
      function updateLoading(progress, text) {
        // Keep last progress in a closure/static var
        if (typeof updateLoading.lastPct !== "number") {
          updateLoading.lastPct = 0;
        }

        let pct = Math.round(Math.max(0, Math.min(100, Number(progress) || 0)));

        // Don’t let it go backwards
        if (pct < updateLoading.lastPct) {
          pct = updateLoading.lastPct;
        }
        updateLoading.lastPct = pct;

        const bar = document.getElementById("loading-bar-fill");
        const label = document.getElementById("loading-percent");
        const status = document.getElementById("loading-text");

        if (!bar || !label || !status) return;

        bar.style.width = pct + "%";
        label.textContent = pct + "%";
        if (typeof text === "string") status.textContent = text;

        if (pct >= 100) {
          document.getElementById("loading-wrap")?.classList.add("hidden");
          document
            .getElementById("matchmaking-screen")
            ?.classList.add("hidden");
          document.getElementById("game-bg")?.classList.add("visible");
        }
      }
    </script>

    <script>
      // map scripts phase to 0–50
      const MAX_BEFORE_DONE = 48; // cap so it never reaches 50% until bundle finishes
      let scriptPct = 0;
      let creepTimer = null;

      function startCreep(label) {
        stopCreep();
        creepTimer = setInterval(() => {
          // gentle creep; raise step if you want faster movement
          if (scriptPct < MAX_BEFORE_DONE) {
            scriptPct = Math.min(MAX_BEFORE_DONE, scriptPct + 0.6);
            updateLoading(scriptPct, label);
          }
        }, 100);
      }
      function stopCreep() {
        if (creepTimer) {
          clearInterval(creepTimer);
          creepTimer = null;
        }
      }

      function loadScript(src) {
        return new Promise((res, rej) => {
          const s = document.createElement("script");
          s.src = src;
          s.async = false; // keep order: Phaser first, then game
          s.onload = res;
          s.onerror = rej;
          document.body.appendChild(s);
        });
      }

      (async () => {
        // Start creeping immediately during Phaser download
        startCreep("Downloading engine…");
        await loadScript(
          "https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser-arcade-physics.min.js",
        );

        // Ensure we show some progress after engine arrives
        scriptPct = Math.max(scriptPct, 22);
        updateLoading(scriptPct, "Engine ready");

        // Keep creeping (still capped at 48%) during bundle download
        updateLoading(scriptPct, "Downloading game…");
        await loadScript("/bundles/game.bundle.js");
        window.__BOOT_GAME__ && window.__BOOT_GAME__();
        // Finish scripts slice cleanly
        stopCreep();
        updateLoading(50, "Scripts loaded"); // handoff to Phaser preload (50–90)
      })().catch((err) => {
        console.error(err);
        stopCreep();
        updateLoading(50, "Failed to load");
      });
    </script>
  </body>
</html>
