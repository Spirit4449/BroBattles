<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account</title>
    <link rel="shortcut icon" href="/assets/sword.svg" type="image/x-icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/bundles/signup.css" />
  </head>
  <body>
    <div class="container">
      <div class="auth-card">
        <h1>Create Account</h1>
        <p class="subtitle">Join the battle and save your progress</p>

        <div class="guest-info">
          <p>
            All progress from guest account
            <span class="guest-name" id="guestName">Guest</span> will be saved
            to this account.
          </p>
        </div>

        <form id="signupForm">
          <div class="form-group">
            <label for="username" class="form-label">Username</label>
            <input
              type="text"
              id="username"
              name="username"
              class="form-input"
              placeholder="Unique and seen by others"
              autocomplete="username"
              required
            />
          </div>

          <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              class="form-input"
              placeholder="Choose a secure password"
              autocomplete="new-password"
              required
            />
          </div>

          <button
            type="submit"
            class="auth-button pixel-menu-button"
            id="signupBtn"
          >
            <div class="button-content">
              <div class="loading" id="loading"></div>
              <span id="buttonText">Create Account</span>
            </div>
          </button>

          <div class="error-message" id="errorMessage"></div>
        </form>

        <div class="link-section">
          <a href="/login" class="auth-link pixel-menu-button">Login instead</a>
          <a href="/" class="back-link pixel-menu-button">Back to lobby</a>
        </div>
      </div>
    </div>
    <script src="/bundles/signup.bundle.js"></script>
  </body>
</html>
